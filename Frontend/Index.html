<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User CRUD Interface</title>
<link rel="stylesheet" href="Style.css">
</head>
<body>
  
  <h2>User Management</h2>

  <!-- Button Panel -->
  <div class="btn-container">
    <button id="newBtn" onclick="displayForm('newSection')">Create</button>
    <button id="listBtn" onclick="displayForm('listSection')">List</button>
    <button id="editBtn" onclick="displayForm('editSection')">Edit</button>
    <button id="deleteBtn" onclick="displayForm('deleteSection')">Delete</button>
  </div>
  <!-- CREATE SECTION -->
  <section id="newSection">
    <h2>Insert User Data</h2>
    <form id="userForm" action="http://localhost:3000/adduser" method="POST">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="address">Address:</label>
      <input type="text" id="address" name="address" required />

      <label for="company">Company:</label>
      <input type="text" id="company" name="company" required />

      <button type="submit">Add User</button>
    </form>
  </section>
    <!-- LIST SECTION -->
  <section id="listSection">
    <h2>User List</h2>
    <button type="button" onclick="fetchList()">Show Users</button>
    <div id="listResult"></div>
  </section>
  <!-- EDIT SECTION -->
  <section id="editSection">
  <h2>Edit Customer</h2>
  <form id="editForm">
    <label>Customer ID:</label>
    <input type="number" id="editId" required />

    <label>Name:</label>
    <input type="text" id="editName" />

    <label>Address:</label>
    <input type="text" id="editAddress" />

    <label>Company:</label>
    <input type="text" id="editCompany" />

    <button type="submit">Update</button>
  </form>
</section>
  <!-- DELETE SECTION -->
  <section id="deleteSection">
    <h2>Delete User</h2>
    <form id="deleteForm" method="POST" action="http://localhost:3000/deleteuser">
      <label for="deleteId">User ID:</label>
      <input type="text" id="deleteId" name="id" required>
      <button type="submit">Delete</button>
    </form>
  </section>
  <script src="Script.css"></script>
</body>
</html>
